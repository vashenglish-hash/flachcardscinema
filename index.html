<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Кино-флеш-карточки</title>
  <style>
    :root{
      --bg:#0f172a;
      --panel:rgba(12,18,32,.72);
      --panel-2:rgba(20,28,48,.82);
      --text:#f3f6ff;
      --muted:#a7b2c9;
      --accent:#e11d48;
      --accent-2:#7c3aed;
      --gold:#f59e0b;
      --success:#22c55e;
      --warning:#f97316;
      --shadow:0 20px 50px rgba(0,0,0,.38);
      --radius:24px;
      --card-width:clamp(240px, 32vw, 410px);
    }

    *{box-sizing:border-box}

    html, body{
      margin:0;
      min-height:100%;
    }

    body{
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(225,29,72,.18), transparent 25%),
        radial-gradient(circle at 80% 10%, rgba(124,58,237,.18), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(245,158,11,.10), transparent 30%),
        linear-gradient(135deg, rgba(7,10,20,.95), rgba(15,23,42,.96));
      position:relative;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        repeating-linear-gradient(
          90deg,
          rgba(255,255,255,.03) 0 8px,
          transparent 8px 34px
        );
      opacity:.08;
      mix-blend-mode:screen;
    }

    body::after{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 40%);
      opacity:.7;
    }

    .app{
      max-width:1240px;
      margin:0 auto;
      padding:16px;
      position:relative;
      z-index:1;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:14px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    h1{
      margin:0;
      font-size:clamp(24px,3.4vw,42px);
      line-height:1.08;
      letter-spacing:.3px;
    }

    .subtitle{
      color:var(--muted);
      margin-top:6px;
      font-size:14px;
    }

    .controls{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }

    button, select{
      border:none;
      outline:none;
      border-radius:16px;
      padding:11px 15px;
      font-size:14px;
      cursor:pointer;
      transition:.25s ease;
      min-height:44px;
    }

    select{
      background:rgba(255,255,255,.08);
      color:var(--text);
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.08);
      width:100%;
    }

    button{
      background:rgba(255,255,255,.08);
      color:var(--text);
      box-shadow:var(--shadow);
      border:1px solid rgba(255,255,255,.08);
    }

    button:hover, select:hover{
      transform:translateY(-2px);
      filter:brightness(1.08);
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none;
      filter:none;
    }

    .primary{
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#fff;
    }

    .success{
      background:linear-gradient(135deg,#16a34a,var(--success));
      color:#fff;
    }

    .warning{
      background:linear-gradient(135deg,#fb923c,var(--warning));
      color:#fff;
    }

    .gold{
      background:linear-gradient(135deg,#fbbf24,var(--gold));
      color:#1f2937;
      font-weight:700;
    }

    .panel{
      background:var(--panel);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:var(--radius);
      padding:16px;
      box-shadow:var(--shadow);
      margin-bottom:18px;
    }

    .setup{
      display:grid;
      grid-template-columns:minmax(240px, 1fr) auto auto auto;
      gap:10px;
      align-items:end;
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      min-width:0;
    }

    .field label{
      color:var(--muted);
      font-size:13px;
    }

    .stats{
      display:grid;
      grid-template-columns:repeat(4, minmax(140px, 1fr));
      gap:10px;
      margin-bottom:14px;
    }

    .badge{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.08);
      border-radius:999px;
      padding:10px 14px;
      box-shadow:var(--shadow);
      color:var(--muted);
      font-size:13px;
      text-align:center;
    }

    .tabs{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:16px;
    }

    .tab-btn.active{
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#fff;
    }

    .lists-toggle-wrap{
      display:flex;
      justify-content:flex-end;
      margin-bottom:12px;
    }

    .compact-btn{
      font-size:13px;
      min-height:40px;
      padding:9px 14px;
    }

    .card-stage{
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:min(58vh, 620px);
      padding:10px 0;
      perspective:1200px;
      position:relative;
      overflow:hidden;
    }

    .flashcard{
      width:var(--card-width);
      aspect-ratio:4 / 5;
      position:relative;
      transform-style:preserve-3d;
      transition:transform .7s ease, opacity .45s ease;
      cursor:pointer;
      max-height:min(52vh, 560px);
    }

    .flashcard.flipped{
      transform:rotateY(180deg);
    }

    .flashcard.move-out{
      animation:moveOut .45s ease forwards;
      pointer-events:none;
    }

    .flashcard.shuffle-anim{
      animation:shufflePulse .45s ease;
    }

    .face{
      position:absolute;
      inset:0;
      border-radius:30px;
      overflow:hidden;
      backface-visibility:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02)),
        linear-gradient(145deg, #18233d, #121a2f);
      border:1px solid rgba(255,255,255,.08);
    }

    .front{
      padding:14px;
    }

    .back{
      transform:rotateY(180deg);
      padding:24px;
      justify-content:center;
      align-items:center;
      text-align:center;
      background:
        radial-gradient(circle at top, rgba(225,29,72,.18), transparent 35%),
        radial-gradient(circle at bottom, rgba(124,58,237,.15), transparent 35%),
        linear-gradient(145deg, #1a2340, #12182c);
    }

    .image-wrap{
      flex:1;
      min-height:0;
      border-radius:22px;
      overflow:hidden;
      background:#0f172a;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:14px;
      border:1px solid rgba(255,255,255,.08);
      position:relative;
    }

    .image-wrap::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,.22), transparent 35%);
      pointer-events:none;
    }

    .image-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .word{
      font-size:clamp(24px,2.8vw,38px);
      font-weight:800;
      text-align:center;
      margin:4px 0 8px;
      letter-spacing:.2px;
      text-shadow:0 2px 16px rgba(0,0,0,.25);
      line-height:1.1;
    }

    .hint{
      text-align:center;
      color:var(--muted);
      font-size:13px;
    }

    .back .word{
      font-size:clamp(28px,3.4vw,44px);
    }

    .actions{
      margin-top:12px;
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .empty{
      text-align:center;
      padding:24px 16px;
      color:var(--muted);
      font-size:17px;
      animation:fadeIn .4s ease;
    }

    .lists{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:18px;
      margin-top:18px;
      transition:.3s ease;
    }

    .lists.hidden{
      display:none;
    }

    .subpanel{
      background:var(--panel-2);
      backdrop-filter:blur(14px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:16px;
      box-shadow:var(--shadow);
    }

    .subpanel h2{
      margin:0 0 14px;
      font-size:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
      gap:12px;
    }

    .mini-card{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      box-shadow:var(--shadow);
      padding:12px;
      display:flex;
      flex-direction:column;
      gap:10px;
      animation:fadeIn .35s ease;
    }

    .mini-card img{
      width:100%;
      aspect-ratio:4 / 5;
      object-fit:cover;
      border-radius:14px;
      background:#0f172a;
    }

    .mini-title{
      font-size:17px;
      font-weight:700;
      color:var(--text);
    }

    .mini-sub{
      color:var(--muted);
      font-size:14px;
    }

    .mini-actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:auto;
    }

    .small-btn{
      padding:8px 11px;
      font-size:12px;
      border-radius:12px;
      min-height:auto;
    }

    @keyframes fadeIn{
      from{opacity:0; transform:translateY(8px)}
      to{opacity:1; transform:translateY(0)}
    }

    @keyframes shufflePulse{
      0%{transform:translateX(0) rotate(0)}
      25%{transform:translateX(-12px) rotate(-3deg)}
      50%{transform:translateX(12px) rotate(3deg)}
      100%{transform:translateX(0) rotate(0)}
    }

    @keyframes moveOut{
      from{opacity:1; transform:translateY(0) scale(1)}
      to{opacity:0; transform:translateY(-26px) scale(.94)}
    }

    @media (max-width: 1100px){
      .stats{
        grid-template-columns:repeat(2, minmax(150px, 1fr));
      }
    }

    @media (max-width: 980px){
      .setup{
        grid-template-columns:1fr       cardImage.src = card.image;
      cardImage.alt = `${t.imageAlt}: ${frontText}`;

      learnedBtn.disabled = currentView !== "active" && currentView !== "review";
      reviewBtn.disabled = currentView !== "active";
      flipBtn.disabled = false;
      nextBtn.disabled = false;

      updateStats();
      saveState();
    }

    function renderLearnedList(){
      const t = i18n[uiLang];
      learnedGrid.innerHTML = "";

      if(learnedCards.length === 0){
        learnedListEmpty.style.display = "block";
        learnedListEmpty.textContent = t.emptyLearned;
        return;
      }

      learnedListEmpty.style.display = "none";

      learnedCards.forEach(card => {
        const item = document.createElement("div");
        item.className = "mini-card";
        item.innerHTML = `
          <img src="${card.image}" alt="${t.imageAlt}">
          <div class="mini-title">${card.en}</div>
          <div class="mini-sub">${card.ru}</div>
          <div class="mini-actions">
            <button class="small-btn success return-btn" data-id="${card.id}">${t.returnToActive}</button>
          </div>
        `;
        learnedGrid.appendChild(item);
      });

      document.querySelectorAll(".return-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          returnCardToActive(btn.dataset.id, "learned");
        });
      });
    }

    function renderReviewList(){
      const t = i18n[uiLang];
      reviewGrid.innerHTML = "";

      if(reviewCards.length === 0){
        reviewListEmpty.style.display = "block";
        reviewListEmpty.textContent = t.emptyReview;
        return;
      }

      reviewListEmpty.style.display = "none";

      reviewCards.forEach(card => {
        const item = document.createElement("div");
        item.className = "mini-card";
        item.innerHTML = `
          <img src="${card.image}" alt="${t.imageAlt}">
          <div class="mini-title">${card.en}</div>
          <div class="mini-sub">${card.ru}</div>
          <div class="mini-actions">
            <button class="small-btn" data-return-id="${card.id}">${t.returnToActive}</button>
            <button class="small-btn success" data-learned-id="${card.id}">${t.moveToLearned}</button>
          </div>
        `;
        reviewGrid.appendChild(item);
      });

      document.querySelectorAll("[data-return-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          returnCardToActive(btn.dataset.returnId, "review");
        });
      });

      document.querySelectorAll("[data-learned-id]").forEach(btn => {
        btn.addEventListener("click", () => {
          moveReviewToLearned(btn.dataset.learnedId);
        });
      });
    }

    function startGame(){
      activeCards = shuffleArray(cardsData.map(card => ({ ...card })));
      learnedCards = [];
      reviewCards = [];
      currentIndex = 0;
      currentView = "active";
      mode = modeSelect.value;
      renderLearnedList();
      renderReviewList();
      renderCard();
      saveState();
    }

    function flipCard(){
      if(!getCurrentCard()) return;
      flashcard.classList.toggle("flipped");
    }

    function nextCard(){
      const deck = getCurrentDeck();
      if(deck.length === 0) return;
      flashcard.classList.remove("flipped");
      currentIndex = (currentIndex + 1) % deck.length;
      renderCard();
    }

    function markLearned(){
      const card = getCurrentCard();
      if(!card) return;
      if(currentView !== "active" && currentView !== "review") return;

      flashcard.classList.add("move-out");

      setTimeout(() => {
        if(currentView === "active"){
          activeCards = activeCards.filter(item => item.id !== card.id);
        } else {
          reviewCards = reviewCards.filter(item => item.id !== card.id);
        }

        learnedCards.unshift(card);

        if(currentIndex >= getCurrentDeck().length){
          currentIndex = 0;
        }

        renderLearnedList();
        renderReviewList();
        renderCard();
        saveState();
      }, 420);
    }

    function markForReview(){
      const card = getCurrentCard();
      if(!card || currentView !== "active") return;

      flashcard.classList.add("move-out");

      setTimeout(() => {
        activeCards = activeCards.filter(item => item.id !== card.id);
        reviewCards.unshift(card);

        if(currentIndex >= activeCards.length){
          currentIndex = 0;
        }

        renderReviewList();
        renderCard();
        saveState();
      }, 420);
    }

    function returnCardToActive(id, from){
      let card = null;

      if(from === "learned"){
        card = learnedCards.find(item => item.id === id);
        learnedCards = learnedCards.filter(item => item.id !== id);
      }

      if(from === "review"){
        card = reviewCards.find(item => item.id === id);
        reviewCards = reviewCards.filter(item => item.id !== id);
      }

      if(!card) return;

      activeCards.unshift(card);

      if(currentView === from && currentIndex >= getCurrentDeck().length){
        currentIndex = 0;
      }

      renderLearnedList();
      renderReviewList();
      renderCard();
      saveState();
    }

    function moveReviewToLearned(id){
      const card = reviewCards.find(item => item.id === id);
      if(!card) return;

      reviewCards = reviewCards.filter(item => item.id !== id);
      learnedCards.unshift(card);

      if(currentView === "review" && currentIndex >= reviewCards.length){
        currentIndex = 0;
      }

      renderLearnedList();
      renderReviewList();
      renderCard();
      saveState();
    }

    function shuffleDeck(){
      const deck = getCurrentDeck();
      if(deck.length === 0) return;

      flashcard.classList.remove("flipped");
      flashcard.classList.add("shuffle-anim");

      setTimeout(() => {
        if(currentView === "active") shuffleArray(activeCards);
        if(currentView === "learned") shuffleArray(learnedCards);
        if(currentView === "review") shuffleArray(reviewCards);

        currentIndex = 0;
        flashcard.classList.remove("shuffle-anim");
        renderCard();
        saveState();
      }, 300);
    }

    function switchView(view){
      currentView = view;
      currentIndex = 0;
      renderCard();
      saveState();
    }

    function toggleLists(){
      listsVisible = !listsVisible;
      rememberManualListsChoice();
      applyListsVisibility();
      saveState();
    }

    function resetProgress(){
      const t = i18n[uiLang];
      if(!confirm(t.confirmReset)) return;

      localStorage.removeItem(STORAGE_KEY);
      localStorage.removeItem(STORAGE_KEY + "_manual_lists");
      uiLang = "ru";
      mode = "ru-en";
      activeCards = shuffleArray(cardsData.map(card => ({ ...card })));
      learnedCards = [];
      reviewCards = [];
      currentIndex = 0;
      currentView = "active";
      listsVisible = !isShortScreen();
      renderLearnedList();
      renderReviewList();
      updateUIText();
      renderCard();
      saveState();
    }

    toggleUiLangBtn.addEventListener("click", () => {
      uiLang = uiLang === "ru" ? "en" : "ru";
      updateUIText();
      saveState();
    });

    modeSelect.addEventListener("change", () => {
      mode = modeSelect.value;
      renderCard();
      saveState();
    });

    startBtn.addEventListener("click", startGame);
    shuffleBtn.addEventListener("click", shuffleDeck);
    resetProgressBtn.addEventListener("click", resetProgress);
    toggleListsBtn.addEventListener("click", toggleLists);

    activeTabBtn.addEventListener("click", () => switchView("active"));
    learnedTabBtn.addEventListener("click", () => switchView("learned"));
    reviewTabBtn.addEventListener("click", () => switchView("review"));

    flipBtn.addEventListener("click", flipCard);
    nextBtn.addEventListener("click", nextCard);
    learnedBtn.addEventListener("click", markLearned);
    reviewBtn.addEventListener("click", markForReview);
    flashcard.addEventListener("click", flipCard);

    window.addEventListener("resize", autoAdjustLayout);

    loadState();
    autoAdjustLayout();
    updateUIText();
    renderLearnedList();
    renderReviewList();
    renderCard();
  </script>
</body>
</html>
